<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Bio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- particles.js CDN -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      overflow: hidden;
      transition: 0.4s;
    }

    body.light {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
      color: #111;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 40px rgba(0, 150, 255, 0.4);
      animation: fadeIn 1.5s ease;
      width: 90%;
      max-width: 500px;
    }

    body.light .container {
      background: rgba(255,255,255,0.7);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #00c6ff;
      margin-bottom: 15px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00c6ff; }
      to { box-shadow: 0 0 25px #00c6ff, 0 0 40px #0072ff; }
    }

    h1 { font-weight: 600; margin-bottom: 10px; }

    p { font-size: 14px; opacity: 0.8; margin-bottom: 20px; }

    .links a {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    body.light .links a {
      color: white;
    }

    .links a::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: -100%;
      background: rgba(255,255,255,0.2);
      transition: 0.4s;
    }

    .links a:hover::before { left: 100%; }

    .links a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00c6ff;
    }

    .footer { margin-top: 15px; font-size: 12px; opacity: 0.6; }

    /* Toggle button */
    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
      font-size: 12px;
    }

  </style>
</head>
<body>

<div id="particles-js"></div>

<div class="toggle" onclick="toggleTheme()">🌙 / ☀️</div>

<div class="container">
  <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-765855B8CACB6FD692B7CBB3BE20EC36-Png/150/150/AvatarHeadshot/Webp/noFilter" class="avatar" alt="avatar">
  <h1>MOPY.dev</h1>
  <p id="typing"></p>
  
  <!-- Bio Section -->
  <p class="bio">Hi, I'm MOPY 👋 — a professional web developer and Roblox scripter. I love building interactive experiences, clean UI, and bringing ideas to life with code.</p>

  <div class="links">
    <a href="https://mopy565329.developmentz.site">🌐 (old) Portfolio</a>
    <a href="Portfolio.html"> 🌐 (new) Portfolio </a>
    <a href="mailto:MohaimenPygerian@gmail.com">💻 E-mail</a>
    <a href="https://www.roblox.com/users/4248642418/profile">🎮 Roblox Profile</a>
    <a href="https://mopy565329.developmentz.site/Apply.html">📬 Contact Me</a>
  </div>

  <div class="footer">© 2026 MOPY.dev</div>
</div>

<script>
// Typing animation
const text = ["Web Developer ⚡", "Roblox Scripter 🎮", "UI/UX Designer 🎨"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
  const display = document.getElementById("typing");
  if (i < text.length) {
    if (!isDeleting && j <= text[i].length) {
      current = text[i].substring(0, j++);
    } else if (isDeleting && j >= 0) {
      current = text[i].substring(0, j--);
    }

    display.innerHTML = current;

    if (j === text[i].length) isDeleting = true;
    if (j === 0 && isDeleting) {
      isDeleting = false;
      i = (i + 1) % text.length;
    }
  }
  setTimeout(type, isDeleting ? 50 : 100);
}

type();

// Theme toggle
function toggleTheme() {
  document.body.classList.toggle("light");
}

// Particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
