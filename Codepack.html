<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Pack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden;
  padding: 40px 0;
}

/* particles */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* container */
.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0, 150, 255, 0.4);
  width: 90%;
  max-width: 500px;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  margin-bottom: 15px;
}

/* text */
.info {
  font-size: 15px;
  opacity: 0.85;
  line-height: 1.6;
  margin-bottom: 25px;
}

/* back button */
.back {
  display: inline-block;
  padding: 12px 18px;
  border-radius: 10px;
  text-decoration: none;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  transition: 0.3s;
}

.back:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00c6ff;
}

/* footer */
.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <h1>Code Pack</h1>

  <p class="info">
    To get the full code pack:<br><br>
    📩 Request it by e-mail or DM.
  </p>

  <a href="Portfolio.html" class="back">⬅ Back</a>

  <div class="footer">© 2026 MOPY.dev</div>
</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
