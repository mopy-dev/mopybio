<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capabilities</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow: hidden;
}

#particles-js {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 1;
}

h1 {
  position: absolute;
  top: 30px;
  width: 100%;
  text-align: center;
}

/* 3D Wheel */
.scene {
  width: 360px;
  height: 340px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  perspective: 1000px;
}

.carousel {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(.25,.8,.25,1);
}

/* Panels */
.panel {
  position: absolute;
  width: 280px;
  height: 320px;
  left: 40px;
  top: 10px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 18px;
  transition: 0.4s;
  opacity: 0.6;
}

.panel.active {
  transform: scale(1.12);
  opacity: 1;
  box-shadow: 0 0 35px #00c6ff;
}

.panel h3 {
  text-align: center;
  margin-bottom: 8px;
}

.label {
  text-align: center;
  font-size: 12px;
  background: #00c6ff;
  color: black;
  border-radius: 20px;
  padding: 4px 10px;
  display: inline-block;
  margin: 0 auto 10px auto;
}

/* Skill list */
.skill {
  margin: 8px 0;
}

.skill span {
  font-size: 13px;
}

/* Bar */
.bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-top: 3px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  border-radius: 10px;
  transition: width 0.6s ease;
}

/* Controls */
.controls {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin: 0 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
}

/* Back */
.back {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  color: white;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <h1>Capabilities</h1>

  <div class="scene">
    <div class="carousel" id="carousel"></div>
  </div>

  <a href="Portfolio.html" class="back">⬅ Back</a>

  <div class="controls">
    <button onclick="rotate(-1)">⬅</button>
    <button onclick="rotate(1)">➡</button>
  </div>
</div>

<script>
// DATA WITH SKILL LEVELS
const data = [
  {
    name: "Frontend",
    level: "Expert",
    skills: [
      ["🎨 UI Design", 95],
      ["⚡ Client Logic", 95],
      ["🤖 NPC AI", 85],
      ["⚔️ Combat Systems", 90],
      ["🧰 Tools & Abilities", 92]
    ]
  },
  {
    name: "Backend",
    level: "Expert",
    skills: [
      ["💾 Datastores", 95],
      ["🧹 Optimization", 90],
      ["🧠 Logic Systems", 92],
      ["🌐 Web Integration", 85],
      ["🤖 AI Integration", 80]
    ]
  },
  {
    name: "Debugging",
    level: "Pro",
    skills: [
      ["🐞 Debugging Speed", 95],
      ["📂 Code Structure", 90],
      ["📖 Documentation", 85],
      ["🔧 System Fixing", 92]
    ]
  }
];

const carousel = document.getElementById("carousel");
const panelCount = data.length;
const angle = 360 / panelCount;
const radius = 270;

let currRotation = 0;
let currentIndex = 0;

// Create panels
data.forEach((item, i) => {
  const panel = document.createElement("div");
  panel.className = "panel";
  panel.id = "panel-" + i;

  panel.innerHTML = `
    <h3>${item.name}</h3>
    <div class="label">${item.level}</div>
    ${item.skills.map(s => `
      <div class="skill">
        <span>${s[0]}</span>
        <div class="bar">
          <div class="fill" data-width="${s[1]}%"></div>
        </div>
      </div>
    `).join("")}
  `;

  panel.style.transform = `rotateY(${angle * i}deg) translateZ(${radius}px)`;
  carousel.appendChild(panel);
});

function rotate(direction) {
  currRotation += direction * angle;
  currentIndex = (currentIndex - direction + panelCount) % panelCount;

  carousel.style.transform = `rotateY(${currRotation}deg)`;
  updateFocus();
}

function updateFocus() {
  data.forEach((_, i) => {
    const panel = document.getElementById("panel-" + i);
    const fills = panel.querySelectorAll(".fill");

    if (i === currentIndex) {
      panel.classList.add("active");

      // animate bars
      fills.forEach(f => {
        f.style.width = f.dataset.width;
      });

    } else {
      panel.classList.remove("active");

      // reset bars
      fills.forEach(f => {
        f.style.width = "0%";
      });
    }
  });
}

updateFocus();

// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
