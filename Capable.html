<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capabilities</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow: hidden;
}

#particles-js {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 1;
}

h1 {
  position: absolute;
  top: 30px;
  width: 100%;
  text-align: center;
}

/* 3D Wheel */
.scene {
  width: 340px;
  height: 320px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  perspective: 1000px;
}

.carousel {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s ease;
}

.panel {
  position: absolute;
  width: 260px;
  height: 300px;
  left: 40px;
  top: 10px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 15px;
  text-align: left;
  transition: 0.4s;
}

.panel.active {
  transform: scale(1.1);
  box-shadow: 0 0 25px #00c6ff;
}

.panel h3 {
  text-align: center;
  margin-bottom: 10px;
}

/* bullet list */
.panel ul {
  list-style: none;
  font-size: 13px;
  opacity: 0.9;
}

.panel ul li {
  margin: 6px 0;
}

/* Controls */
.controls {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin: 0 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
}

/* Back */
.back {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  color: white;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <h1>Capabilities</h1>

  <div class="scene">
    <div class="carousel" id="carousel"></div>
  </div>

  <a href="Portfolio.html" class="back">⬅ Back</a>

  <div class="controls">
    <button onclick="rotate(-1)">⬅</button>
    <button onclick="rotate(1)">➡</button>
  </div>
</div>

<script>
// YOUR DATA STRUCTURED
const data = [
  {
    name: "Frontend Scripting",
    items: [
      "All kinds of UI",
      "Everything client-sided",
      "NPC / Enemy AI",
      "All kinds of combat",
      "Tools, items, abilities",
      "Almost anything frontend related"
    ]
  },
  {
    name: "Backend Scripting",
    items: [
      "Datastores & leaderstats",
      "Lag removal & cleanup",
      "Pathfinding, logic, anti-cheat",
      "Web integration",
      "AI integration",
      "Almost anything backend related"
    ]
  },
  {
    name: "Debugging & Optimization",
    items: [
      "Debugging complex systems fast",
      "Organising code",
      "Adding code explanations",
      "Improving structure & maintainability"
    ]
  }
];

const carousel = document.getElementById("carousel");
const panelCount = data.length;
const angle = 360 / panelCount;
const radius = 260;

let currRotation = 0;
let currentIndex = 0;

// Create panels
data.forEach((item, i) => {
  const panel = document.createElement("div");
  panel.className = "panel";
  panel.id = "panel-" + i;

  panel.innerHTML = `
    <h3>${item.name}</h3>
    <ul>
      ${item.items.map(x => `<li>• ${x}</li>`).join("")}
    </ul>
  `;

  const panelAngle = angle * i;
  panel.style.transform = `rotateY(${panelAngle}deg) translateZ(${radius}px)`;

  carousel.appendChild(panel);
});

function rotate(direction) {
  currRotation += direction * angle;
  currentIndex = (currentIndex - direction + panelCount) % panelCount;

  carousel.style.transform = `rotateY(${currRotation}deg)`;
  updateFocus();
}

function updateFocus() {
  data.forEach((_, i) => {
    const panel = document.getElementById("panel-" + i);
    panel.classList.toggle("active", i === currentIndex);
  });
}

updateFocus();

// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
