<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden;
  padding: 40px 20px;
}

/* particles */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* container */
.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: auto;
  text-align: center;
}

/* title */
h1 {
  margin-bottom: 30px;
}

/* stat cards */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat {
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,150,255,0.3);
}

.stat h2 {
  color: #00c6ff;
}

/* chart box */
.chart-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,150,255,0.3);
}

/* back */
.back {
  display: inline-block;
  margin-top: 30px;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* footer */
.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

  <h1>📊 Analytics</h1>

  <!-- STAT CARDS -->
  <div class="stats">
    <div class="stat">
      <h2>50M+</h2>
      <p>Game Visits Contributed</p>
    </div>

    <div class="stat">
      <h2>1.2M</h2>
      <p>Robux Earned</p>
    </div>

    <div class="stat">
      <h2>7</h2>
      <p>Years Experience</p>
    </div>
  </div>

  <!-- BAR CHART -->
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>

  <!-- PIE CHART -->
  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>

  <a href="Portfolio.html" class="back">⬅ Back</a>

  <div class="footer">© 2026 MOPY.dev</div>
</div>

<script>
// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});

// BAR CHART
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: ['Visits (M)', 'Robux (M)', 'Years'],
    datasets: [{
      label: 'Stats',
      data: [50, 1.2, 7],
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false }
    }
  }
});

// PIE CHART
new Chart(document.getElementById('pieChart'), {
  type: 'doughnut',
  data: {
    labels: ['Visits Impact', 'Earnings', 'Experience'],
    datasets: [{
      data: [70, 20, 10],
    }]
  },
  options: {
    responsive: true
  }
});
</script>

</body>
</html>
