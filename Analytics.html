<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden;
  padding: 40px 20px;
  transition: 0.3s;
}

body.light {
  background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
  color: #111;
}

#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: auto;
  text-align: center;
}

h1 {
  margin-bottom: 30px;
}

/* toggle */
.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
  font-size: 12px;
  z-index: 2;
}

/* stats */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat {
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,150,255,0.3);
}

.stat h2 {
  color: #00c6ff;
}

/* charts */
.chart-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,150,255,0.3);
}

/* inputs */
input {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* back */
.back {
  display: inline-block;
  margin-top: 30px;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="toggle" onclick="toggleTheme()">🌙 / ☀️</div>

<div class="container">

  <h1>📊 Analytics</h1>

  <div class="stats">
    <div class="stat">
      <h2>50M+</h2>
      <p>Game Visits Contributed</p>
    </div>

    <div class="stat">
      <h2>1.2M</h2>
      <p>Robux Earned Last Month</p>
    </div>

    <div class="stat">
      <h2>7</h2>
      <p>Years Experience</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>

  <div class="chart-box">
    <h2>💱 DevEx Calculator</h2>
    <input id="robuxInput" type="number" placeholder="Enter Robux...">
    <input id="usdInput" type="number" placeholder="Enter USD...">
  </div>

  <a href="Portfolio.html" class="back">⬅ Back</a>

  <div class="footer">© 2026 MOPY.dev</div>
</div>

<script>
// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});

// THEME
function toggleTheme() {
  document.body.classList.toggle("light");
  updateCharts();
}

let barChart, pieChart;

function createCharts(color) {
  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();

  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: ['Visits (M)', 'Robux Last Month (K)', 'Years'],
      datasets: [{
        data: [50, 1200, 7],
        backgroundColor: '#00c6ff'
      }]
    },
    options: {
      scales: {
        x: { ticks: { color } },
        y: { ticks: { color } }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });

  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: ['Visits Impact', 'Earnings', 'Experience'],
      datasets: [{
        data: [60, 30, 10]
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color }
        }
      }
    }
  });
}

function updateCharts() {
  const isLight = document.body.classList.contains("light");
  const color = isLight ? "#111" : "#fff";
  createCharts(color);
}

// init charts
updateCharts();

// DEVEX CALCULATOR
const robuxInput = document.getElementById("robuxInput");
const usdInput = document.getElementById("usdInput");

const RATE = 38 / 10000;

robuxInput.addEventListener("input", () => {
  const robux = robuxInput.value;
  usdInput.value = robux ? (robux * RATE).toFixed(2) : "";
});

usdInput.addEventListener("input", () => {
  const usd = usdInput.value;
  robuxInput.value = usd ? Math.round(usd / RATE) : "";
});
</script>

</body>
</html>
