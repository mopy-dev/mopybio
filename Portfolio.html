<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      overflow: hidden;
      transition: 0.4s;
    }

    body.light {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
      color: #111;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 40px rgba(0, 150, 255, 0.4);
      animation: fadeIn 1.5s ease;
      width: 90%;
      max-width: 500px;
    }

    body.light .container {
      background: rgba(255,255,255,0.7);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #00c6ff;
      margin-bottom: 15px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #00c6ff; }
      to { box-shadow: 0 0 25px #00c6ff, 0 0 40px #0072ff; }
    }

    h1 { font-weight: 600; margin-bottom: 20px; }

    .links a {
      display: block;
      margin: 12px 0;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
      font-size: 15px;
    }

    .links a::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: -100%;
      background: rgba(255,255,255,0.2);
      transition: 0.4s;
    }

    .links a:hover::before { left: 100%; }

    .links a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00c6ff;
    }

    .footer { margin-top: 15px; font-size: 12px; opacity: 0.6; }

    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
      font-size: 12px;
    }

    .back {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  color: white;
}
  </style>
</head>
<body>

<div id="particles-js"></div>

<div class="toggle" onclick="toggleTheme()">🌙 / ☀️</div>

<div class="container">
  <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-765855B8CACB6FD692B7CBB3BE20EC36-Png/150/150/AvatarHeadshot/Webp/noFilter" class="avatar">
  <h1>Portfolio</h1>

  <div class="links">
    <a href="Prevwork.html">🏢 Previous Workplaces</a>
    <a href="Vidshow.html">🎬 Showcasing Videos</a>
    <a href="Snippets.html">💻 Code Snippets</a>
    <a href="Capable.html">⚙️ Capabilities</a>
  </div>
  <a href="Portfolio.html" class="back">⬅ Back</a>
  <div class="footer">© 2026 MOPY.dev</div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}

particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
