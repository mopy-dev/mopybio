<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply for a Commission</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  min-height: 100vh; /* FIX */
  display: flex;
  justify-content: center;
  align-items: flex-start; /* FIX */
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden; /* FIX */
  padding: 40px 0; /* spacing top/bottom */
}

/* particles */
#particles-js {
  position: fixed; /* FIX */
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* container */
.container {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 600px;
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 40px rgba(0,150,255,0.4);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* form */
.form-row {
  margin-bottom: 14px;
}

label {
  font-size: 13px;
  opacity: 0.85;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 5px;
  background: rgba(255,255,255,0.1);
  color: white;
  outline: none;
}

/* button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px #00c6ff;
}

/* back */
.back {
  display: block;
  text-align: center;
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* footer */
.footer {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <h2>Apply for a Commission</h2>

  <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="1cce650f-afc0-410f-acfd-89f107cf1a8b" />
    <input type="hidden" name="recipient" value="mohaimenpygerian@gmail.com" />

    <div class="form-row">
      <label>Name *</label>
      <input name="field_1_b82oe93" type="text" required>
    </div>

    <div class="form-row">
      <label>Email *</label>
      <input name="field_2_t164ck1" type="email" required>
    </div>

    <div class="form-row">
      <label>Discord Username *</label>
      <input name="field_3_4h2ld84" type="text" required>
    </div>

    <div class="form-row">
      <label>Age *</label>
      <input name="field_4_vypt2nj" type="number" required>
    </div>

    <div class="form-row">
      <label>What's the commission about? *</label>
      <input name="field_5_71g8wzc" type="text" required>
    </div>

    <div class="form-row">
      <label>Payment Amount *</label>
      <input name="field_6_anfjldz" type="text" required>
    </div>

    <div class="form-row">
      <label>Payment Type *</label>
      <select name="field_7_e558gdv" required>
        <option>Robux</option>
        <option>USD-EUR</option>
      </select>
    </div>

    <button type="submit">🚀 Send Application</button>
  </form>

  <a href="index.html" class="back">⬅ Back</a>

  <div class="footer">© 2026 MOPY.dev</div>
</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
